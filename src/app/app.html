<main class="min-h-screen bg-[#f7f3ea] text-zinc-950">
  <div class="fixed inset-x-0 top-0 z-20 border-b border-zinc-950/10 bg-[#f7f3ea]/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
      <a routerLink="/" class="group flex items-center gap-3">
        <span class="grid size-10 place-items-center rounded-sm bg-zinc-950 text-sm font-black text-white shadow-[4px_4px_0_#14b8a6]">SF</span>
        <span class="leading-tight">
          <span class="block text-sm font-black uppercase tracking-[0.24em] text-zinc-500">Angular</span>
          <span class="block text-lg font-black">Signal Forms Lab</span>
        </span>
      </a>

      <a
        routerLink="/login-basics"
        class="hidden rounded-sm bg-zinc-950 px-4 py-2 text-sm font-bold text-white shadow-[4px_4px_0_#f59e0b] transition hover:-translate-y-0.5 md:inline-flex"
      >
        Start demo
      </a>
    </div>
  </div>

  <div class="mx-auto grid max-w-7xl gap-6 px-4 pb-10 pt-24 sm:px-6 lg:grid-cols-[260px_minmax(0,1fr)] lg:px-8">
    <aside class="lg:sticky lg:top-24 lg:h-[calc(100vh-7rem)] lg:overflow-auto">
      <nav class="grid gap-2">
        <a
          routerLink="/"
          routerLinkActive="active bg-zinc-950 text-white shadow-[4px_4px_0_#14b8a6]"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-sm border border-zinc-950/10 bg-white/70 px-3 py-2 text-sm font-bold transition hover:-translate-y-0.5 hover:border-zinc-950/30"
        >
          Overview
        </a>

        @for (demo of demos; track demo.path) {
          <a
            [routerLink]="demo.path"
            routerLinkActive="active bg-zinc-950 text-white shadow-[4px_4px_0_#14b8a6]"
            class="group rounded-sm border border-zinc-950/10 bg-white/70 px-3 py-2 transition hover:-translate-y-0.5 hover:border-zinc-950/30"
          >
            <span class="block text-[0.65rem] font-black uppercase tracking-[0.2em] text-zinc-500 group-[.active]:text-white/60">{{ demo.eyebrow }}</span>
            <span class="block text-sm font-black">{{ demo.shortTitle }}</span>
          </a>
        }
      </nav>
    </aside>

    <section class="min-w-0">
      <router-outlet />
    </section>
  </div>
</main>
